<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago completado — RentaBot 2025</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2eb; --surface: #faf8f3; --border: #ddd8cc;
      --ink: #1a1714; --ink-muted: #6b6560; --accent: #c0392b;
      --green: #27ae60;
    }
    html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; }
    .card {
      background: white; border: 1px solid var(--border); border-radius: 16px;
      padding: 48px 40px; max-width: 420px; width: 90%; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 3.5rem; margin-bottom: 16px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 10px; }
    p { color: var(--ink-muted); font-size: 0.9rem; line-height: 1.65; margin-bottom: 28px; }
    .credits-badge {
      background: #eafaf1; border: 1.5px solid #27ae60; border-radius: 12px;
      padding: 16px; margin-bottom: 28px; color: var(--green); font-weight: 500;
      font-size: 1rem;
    }
    .btn {
      display: inline-block; background: var(--accent); color: white;
      padding: 13px 28px; border-radius: 10px; text-decoration: none;
      font-weight: 500; font-size: 0.9rem; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>¡Pago completado!</h1>
    <p>Tus créditos han sido añadidos. Ya puedes seguir consultando tus dudas sobre el IRPF 2025.</p>
    <div class="credits-badge" id="credits-info">Cargando créditos...</div>
    <a href="/" class="btn">Volver a RentaBot →</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pack = params.get('pack');
    const questions = parseInt(params.get('questions') || '0');

    if (questions > 0) {
      // Add credits to localStorage
      const current = parseInt(localStorage.getItem('rentabot_credits') || '0');
      const newTotal = current + questions;
      localStorage.setItem('rentabot_credits', newTotal);
      // Reset free questions used so credits take over
      localStorage.setItem('rentabot_paid', 'true');

      document.getElementById('credits-info').textContent =
        `🎉 ${questions} preguntas añadidas · Total disponible: ${newTotal}`;
    } else {
      document.getElementById('credits-info').textContent = 'Créditos añadidos correctamente';
    }
  </script>
</body>
</html>
